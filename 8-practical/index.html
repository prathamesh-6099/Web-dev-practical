<!DOCTYPE html>
<html>
<head>
  <title>Practical 8 - JS Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 30px; }
    input { padding: 8px; width: 100px; font-size: 16px; }
    select { padding: 8px; font-size: 16px; }
    button { padding: 10px 25px; font-size: 16px; background-color: darkblue; color: white; border: none; cursor: pointer; margin-top: 10px; }
    button:hover { background-color: blue; }
    #result {
      margin-top: 15px;
      font-size: 20px;
      font-weight: bold;
      color: darkgreen;
      background: #f0fff0;
      padding: 10px;
      display: inline-block;
      min-width: 200px;
      border: 1px solid green;
    }
    .error { color: red; }
  </style>
</head>
<body>

  <h2>Practical 8 - Simple Calculator (Functions + Switch-Case)</h2>
  <hr>

  <!-- Input fields for numbers and operator -->
  <label>Enter Number 1:</label><br>
  <input type="number" id="num1" placeholder="e.g. 10"><br><br>

  <label>Select Operator:</label><br>
  <select id="operator">
    <option value="+">+ Addition</option>
    <option value="-">- Subtraction</option>
    <option value="*">* Multiplication</option>
    <option value="/">/ Division</option>
    <option value="%">% Modulus</option>
  </select><br><br>

  <label>Enter Number 2:</label><br>
  <input type="number" id="num2" placeholder="e.g. 5"><br><br>

  <button onclick="calculate()">Calculate</button>
  <button onclick="clearFields()" style="background-color: gray;">Clear</button>

  <!-- Result displayed here -->
  <div id="result">Result will appear here...</div>


  <!-- =============================================
       JAVASCRIPT - Functions + Switch-Case
       ============================================= -->
  <script>

    // Main function called when Calculate button is clicked
    function calculate() {

      // Read values from input fields
      var num1 = parseFloat(document.getElementById("num1").value);
      var num2 = parseFloat(document.getElementById("num2").value);
      var operator = document.getElementById("operator").value;

      // isNaN = "is Not a Number" - checks if input is empty or invalid
      if (isNaN(num1) || isNaN(num2)) {
        showResult("Please enter valid numbers!", true);
        return;  // Stop the function here
      }

      // Call the doCalculation function and store its return value
      var answer = doCalculation(num1, num2, operator);

      // Display the result
      if (answer !== null) {
        showResult(num1 + " " + operator + " " + num2 + " = " + answer, false);
      }
    }


    // Function that uses SWITCH-CASE to perform the calculation
    function doCalculation(a, b, op) {

      var result;

      // switch checks the value of 'op' and runs matching case
      switch (op) {

        case "+":
          result = a + b;  // Addition
          break;           // break stops execution of further cases

        case "-":
          result = a - b;  // Subtraction
          break;

        case "*":
          result = a * b;  // Multiplication
          break;

        case "/":
          // Special check: cannot divide by zero
          if (b === 0) {
            showResult("Error: Division by zero is not allowed!", true);
            return null;  // Return null to signal error
          }
          result = a / b;  // Division
          break;

        case "%":
          // Special check: modulus by zero not allowed
          if (b === 0) {
            showResult("Error: Modulus by zero is not allowed!", true);
            return null;
          }
          result = a % b;  // Modulus (remainder)
          break;

        default:
          // default runs if no case matches
          showResult("Unknown operator!", true);
          return null;
      }

      return result;  // Return the calculated result
    }


    // Helper function to display result or error message
    function showResult(message, isError) {
      var resultDiv = document.getElementById("result");
      resultDiv.innerHTML = message;

      // Change color based on whether it's an error or success
      if (isError) {
        resultDiv.style.color = "red";
        resultDiv.style.borderColor = "red";
        resultDiv.style.backgroundColor = "#fff0f0";
      } else {
        resultDiv.style.color = "darkgreen";
        resultDiv.style.borderColor = "green";
        resultDiv.style.backgroundColor = "#f0fff0";
      }
    }


    // Clear / Reset function
    function clearFields() {
      document.getElementById("num1").value = "";
      document.getElementById("num2").value = "";
      document.getElementById("operator").value = "+";
      document.getElementById("result").innerHTML = "Result will appear here...";
      document.getElementById("result").style.color = "darkgreen";
    }

  </script>

</body>
</html>

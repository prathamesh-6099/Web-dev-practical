<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simpler calculator</title>
    <style>

    </style>
</head>

<body>
    <h1> Simple Calculator using Functions and Switch Case</h1>
    <div id="cal">
        <label> Enter 1st number </label>
        <input type="number" id="num1" placeholder="e.g 12"><br>

        <label for="">Enter operator</label>
        <select name="operator" id="op">
            <option value="+">+ Adddititon</option>
            <option value="-">- Subtraction</option>
            <option value="*">* Multiplication</option>
            <option value="/">/ Division</option>
            <option value="%">% modulas</option>
        </select><br><br>

        <label> Enter 2nd number </label>
        <input type="number" id="num2" placeholder="e.g 42"><br><br>

        <div id="result" style="font-size: 2rem;">Result will appear here...</div><br>

        <button onclick="displayres()">result</button>
        <button onclick="reset()">Clear</button>
    </div>

    <script>
        function displayres() {
            let num1 = parseFloat(document.getElementById('num1').value);
            console.log(num1);
            let num2 = parseFloat(document.getElementById("num2").value);
            console.log(num2)
            let op = document.getElementById('op').value;
            let res;

            switch (op) {
                case "+": res = num1 + num2; break;
                case "-": res = num1 - num2; break;
                case "*": res = num1 * num2; break;
                case "/": res = (num2 != 0) ? num1 / num2 : "num2 is 0"; break;
                case "%": res = (num2 !== 0) ? num1 % num2 : "Error: Mod by 0"; break;
                default: res = "Error";
            }

            document.getElementById("result").innerHTML = "Result : " + res;

        }

        function reset() {
            document.getElementById("num1").value = "";
            document.getElementById("num2").value = "";
            document.getElementById("result").innerHTML = "Result will appear here...";
        }




    </script>
</body>

</html>

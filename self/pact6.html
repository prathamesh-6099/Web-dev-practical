<html>

<head>
    <title> Form validation</title>
</head>

<body>
    <h1>Demo Form</h1>

    <form onsubmit="return formvalidation()">

        <label for=""> Name: </label>
        <input type="text" id="name" placeholder="Enter ur name"><br><br>

        <label for="">Phone:</label>
        <input type="number" id="phone" placeholder="Enter ur 10 Digit number"><br><br>

        <label for="">Email:</label>
        <input type="email" id="email" placeholder="Enter ur Email"><br><br>

        <input type="submit" value="Submit-Form"><br><br>

        <p id="er" style="color: red;">  </p>
    </form>

    <script>
        function formvalidation() {
            let name = document.getElementById("name").value;
            let phone = document.getElementById("phone").value;
            let email = document.getElementById("email").value;
            let msg = document.getElementById("er");

            if (name === "") {
                msg.innerText = "name should be filled";
                return false;
            }
            if (phone.length != 10 || isNaN(phone)) {
                msg.innerText = "Number contain 10 letters";
                return false;
            }
            if (email.indexOf('@') === -1 || email.indexOf('.') === -1) {
                msg.innerText = "Enter valid Email";
                return false;
            }

            msg.innerText="Form Submitted Successfully";
            msg.style.color="green";

            return false;
        }
    </script>
</body>

</html>
